<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" lang="fr">

<head>

    <meta charset="UTF-8">

    <title>Étudiants - EHTP Stage Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{

            margin:0;

            font-family:Arial,sans-serif;

            background:#f4f7fb;

        }

        .sidebar{

            position:fixed;

            left:0;

            top:0;

            width:250px;

            height:100vh;

            background:linear-gradient(180deg,#0f172a,#1e3a8a);

            padding:30px 20px;

            color:white;

        }

        .logo-box{

            width:90px;

            height:90px;

            background:white;

            border-radius:50%;

            display:flex;

            align-items:center;

            justify-content:center;

            margin:0 auto 15px;

            overflow:hidden;

        }

        .logo-box img{

            width:115px;

        }

        .sidebar h2{

            text-align:center;

            font-weight:bold;

            margin-bottom:35px;

        }

        .sidebar a{

            display:block;

            color:white;

            text-decoration:none;

            padding:14px;

            border-radius:12px;

            margin-bottom:10px;

        }

        .sidebar a:hover{

            background:rgba(255,255,255,0.15);

        }

        .main{

            margin-left:270px;

            padding:40px;

        }

        .card-box{

            background:white;

            border-radius:20px;

            padding:25px;

            box-shadow:0 5px 20px rgba(0,0,0,0.08);

            margin-bottom:30px;

        }

        .btn-purple{

            background:#6d28d9;

            color:white;

            border:none;

        }

        .btn-purple:hover{

            background:#5b21b6;

            color:white;

        }

        table th{

            background:#6d28d9 !important;

            color:white !important;

        }

        .edit-btn{

            color:#2563eb;

            font-weight:bold;

            text-decoration:none;

            margin-right:10px;

        }

        .delete-btn{

            color:#dc2626;

            font-weight:bold;

            text-decoration:none;

        }

    </style>

</head>

<body>

<div class="sidebar">

    <div class="logo-box">

        <img src="/images/logo-ehtp.png" alt="Logo EHTP">

    </div>

    <h2>EHTP Stage</h2>

    <a href="/dashboard">Dashboard</a>

    <a href="/students-db">Étudiants</a>

    <a href="/internships-db">Stages</a>

    <a href="/companies-db">Entreprises</a>

    <a href="/">Accueil</a>

</div>

<div class="main">

    <h1 class="fw-bold mb-4">Gestion des étudiants</h1>

    <div class="card-box">

        <h4 class="mb-3">Ajouter un étudiant</h4>

        <form th:action="@{/students-db/save}" th:object="${student}" method="post" class="row g-3">

            <div class="col-md-3">

                <input type="text" th:field="*{nom}" class="form-control" placeholder="Nom" required>

            </div>

            <div class="col-md-3">

                <input type="email" th:field="*{email}" class="form-control" placeholder="Email" required>

            </div>

            <div class="col-md-2">

                <input type="text" th:field="*{filiere}" class="form-control" placeholder="Filière" required>

            </div>

            <div class="col-md-2">

                <input type="text" th:field="*{niveau}" class="form-control" placeholder="Niveau" required>

            </div>

            <div class="col-md-2">

                <button type="submit" class="btn btn-purple w-100">Ajouter</button>

            </div>

        </form>

    </div>

    <div class="card-box">

        <form method="get" action="/students-db" class="row g-3 mb-4">

            <div class="col-md-10">

                <input type="text"

                       name="keyword"

                       th:value="${keyword}"

                       class="form-control"

                       placeholder="Rechercher un étudiant par nom...">

            </div>

            <div class="col-md-2">

                <button type="submit" class="btn btn-purple w-100">Rechercher</button>

            </div>

        </form>

        <table class="table table-hover align-middle">

            <thead>

            <tr>

                <th>ID</th>

                <th>Nom</th>

                <th>Email</th>

                <th>Filière</th>

                <th>Niveau</th>

                <th>Action</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="student : ${students}">

                <td th:text="${student.id}"></td>

                <td th:text="${student.nom}"></td>

                <td th:text="${student.email}"></td>

                <td th:text="${student.filiere}"></td>

                <td th:text="${student.niveau}"></td>

                <td>

                    <a class="edit-btn" th:href="@{'/students-db/edit/' + ${student.id}}">Modifier</a>

                    <a class="delete-btn" th:href="@{'/students-db/delete/' + ${student.id}}">Supprimer</a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>

</html>
