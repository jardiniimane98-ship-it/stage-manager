<!DOCTYPE html>

<html lang="fr">

<head>

    <meta charset="UTF-8">

    <title>Inscription - EHTP Stage Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{

            min-height:100vh;

            background:linear-gradient(135deg,#020617,#1e3a8a,#2563eb);

            display:flex;

            align-items:center;

            justify-content:center;

            font-family:Arial,sans-serif;

        }

        .register-card{

            width:480px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,0.25);

            border-radius:30px;

            padding:40px;

            color:white;

            box-shadow:0 25px 60px rgba(0,0,0,0.35);

        }

        .logo-box{

            width:110px;

            height:110px;

            background:white;

            border-radius:50%;

            display:flex;

            align-items:center;

            justify-content:center;

            margin:0 auto 20px;

            overflow:hidden;

        }

        .logo-box img{

            width:135px;

        }

        input, select{

            border-radius:14px !important;

            padding:13px !important;

        }

        .btn-register{

            border-radius:14px;

            padding:13px;

            font-weight:bold;

        }

        a{

            color:#dbeafe;

            text-decoration:none;

        }

    </style>

</head>

<body>

<div class="register-card">

    <div class="logo-box">

        <img src="/images/logo-ehtp.png" alt="Logo EHTP">

    </div>

    <h2 class="text-center fw-bold mb-4">Créer un compte</h2>

    <form action="/login" method="get">

        <div class="mb-3">

            <input type="text" class="form-control" placeholder="Nom complet" required>

        </div>

        <div class="mb-3">

            <input type="email" class="form-control" placeholder="Adresse email" required>

        </div>

        <div class="mb-3">

            <select class="form-control" required>

                <option value="">Choisir un rôle</option>

                <option>Étudiant</option>

                <option>Entreprise</option>

                <option>Administrateur</option>

            </select>

        </div>

        <div class="mb-3">

            <input type="password" class="form-control" placeholder="Mot de passe" required>

        </div>

        <button type="submit" class="btn btn-primary w-100 btn-register">

            S'inscrire

        </button>

    </form>

    <div class="text-center mt-4">

        <a href="/login">Déjà un compte ? Connexion</a>

    </div>

</div>

</body>

</html>
