<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Entreprises Database</title>

    <style>

        body {

            font-family: Arial, sans-serif;

            margin: 30px;

            background: #f4f4f4;

        }

        h1 {

            color: #333;

        }

        form {

            background: white;

            padding: 20px;

            border-radius: 10px;

            margin-bottom: 30px;

            box-shadow: 0 2px 5px rgba(0,0,0,0.1);

        }

        input {

            padding: 10px;

            margin: 10px;

            width: 220px;

        }

        button {

            padding: 10px 20px;

            background: purple;

            color: white;

            border: none;

            border-radius: 5px;

            cursor: pointer;

        }

        table {

            width: 100%;

            border-collapse: collapse;

            background: white;

        }

        th {

            background: purple;

            color: white;

            padding: 12px;

        }

        td {

            padding: 10px;

            border-bottom: 1px solid #ddd;

        }

        .delete-btn {

            color: red;

            text-decoration: none;

            font-weight: bold;

        }

    </style>

</head>

<body>

<h1>Liste des entreprises</h1>

<form th:action="@{/companies-db/save}" th:object="${company}" method="post">

    <input type="text" th:field="*{nom}" placeholder="Nom entreprise" required>

    <input type="text" th:field="*{secteur}" placeholder="Secteur" required>

    <input type="text" th:field="*{ville}" placeholder="Ville" required>

    <input type="email" th:field="*{email}" placeholder="Email" required>

    <button type="submit">Ajouter</button>

</form>

<table>

    <tr>

        <th>ID</th>

        <th>Nom</th>

        <th>Secteur</th>

        <th>Ville</th>

        <th>Email</th>

        <th>Action</th>

    </tr>

    <tr th:each="company : ${companies}">

        <td th:text="${company.id}"></td>

        <td th:text="${company.nom}"></td>

        <td th:text="${company.secteur}"></td>

        <td th:text="${company.ville}"></td>

        <td th:text="${company.email}"></td>

        <td>

            <a class="delete-btn"

               th:href="@{'/companies-db/delete/' + ${company.id}}">

                Supprimer

            </a>

        </td>

    </tr>

</table>

</body>

</html>
