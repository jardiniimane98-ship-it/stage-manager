<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Stages Database</title>

    <style>

        body {

            font-family: Arial, sans-serif;

            margin: 30px;

            background: #f4f4f4;

        }

        h1 {

            color: #333;

        }

        form {

            background: white;

            padding: 20px;

            border-radius: 10px;

            margin-bottom: 30px;

            box-shadow: 0 2px 5px rgba(0,0,0,0.1);

        }

        input {

            padding: 10px;

            margin: 10px;

            width: 220px;

        }

        button {

            padding: 10px 20px;

            background: purple;

            color: white;

            border: none;

            border-radius: 5px;

            cursor: pointer;

        }

        table {

            width: 100%;

            border-collapse: collapse;

            background: white;

        }

        th {

            background: purple;

            color: white;

            padding: 12px;

        }

        td {

            padding: 10px;

            border-bottom: 1px solid #ddd;

        }

        .delete-btn {

            color: red;

            text-decoration: none;

            font-weight: bold;

        }

    </style>

</head>

<body>

<h1>Liste des stages</h1>

<form th:action="@{/internships-db/save}" th:object="${internship}" method="post">

    <input type="text" th:field="*{titre}" placeholder="Titre du stage" required>

    <input type="text" th:field="*{entreprise}" placeholder="Entreprise" required>

    <input type="text" th:field="*{etudiant}" placeholder="Etudiant" required>

    <input type="text" th:field="*{dateDebut}" placeholder="Date début" required>

    <input type="text" th:field="*{dateFin}" placeholder="Date fin" required>

    <input type="text" th:field="*{statut}" placeholder="Statut" required>

    <button type="submit">Ajouter</button>

</form>

<table>

    <tr>

        <th>ID</th>

        <th>Titre</th>

        <th>Entreprise</th>

        <th>Etudiant</th>

        <th>Date début</th>

        <th>Date fin</th>

        <th>Statut</th>

        <th>Action</th>

    </tr>

    <tr th:each="internship : ${internships}">

        <td th:text="${internship.id}"></td>

        <td th:text="${internship.titre}"></td>

        <td th:text="${internship.entreprise}"></td>

        <td th:text="${internship.etudiant}"></td>

        <td th:text="${internship.dateDebut}"></td>

        <td th:text="${internship.dateFin}"></td>

        <td th:text="${internship.statut}"></td>

        <td>

            <a class="delete-btn"

               th:href="@{'/internships-db/delete/' + ${internship.id}}">

                Supprimer

            </a>

        </td>

    </tr>

</table>

</body>

</html>
