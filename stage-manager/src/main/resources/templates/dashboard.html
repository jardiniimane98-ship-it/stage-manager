<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" lang="fr">

<head>

    <meta charset="UTF-8">

    <title>Dashboard - EHTP Stage Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"

          rel="stylesheet">

    <style>

        body{

            margin:0;

            font-family:Arial,sans-serif;

            background:#f4f7fb;

        }

        .sidebar{

            position:fixed;

            left:0;

            top:0;

            width:250px;

            height:100vh;

            background:linear-gradient(180deg,#0f172a,#1e3a8a);

            padding:30px 20px;

            color:white;

        }

        .sidebar h2{

            margin-bottom:20px;

            font-weight:bold;

        }

        .logo{

            width:90px;

            background:white;

            padding:8px;

            border-radius:15px;

        }

        .sidebar a{

            display:block;

            color:white;

            text-decoration:none;

            padding:14px;

            border-radius:12px;

            margin-bottom:10px;

        }

        .sidebar a:hover{

            background:rgba(255,255,255,0.15);

        }

        .main{

            margin-left:270px;

            padding:40px;

        }

        .stats{

            display:grid;

            grid-template-columns:repeat(4,1fr);

            gap:20px;

            margin-bottom:40px;

        }

        .card-box{

            background:white;

            padding:25px;

            border-radius:20px;

            box-shadow:0 5px 20px rgba(0,0,0,0.08);

        }

        .stats h2{

            color:#1e3a8a;

            font-size:38px;

        }

    </style>

</head>

<body>

<div class="sidebar">

    <div class="text-center mb-4">

        <img src="/images/logo-ehtp.png"

             alt="Logo EHTP"

             class="logo mb-3">

        <h2>EHTP Stage</h2>

    </div>

    <a href="/dashboard">Dashboard</a>

    <a href="/students-db">Étudiants</a>

    <a href="/internships-db">Stages</a>

    <a href="/companies-db">Entreprises</a>

    <a href="/">Accueil</a>

</div>

<div class="main">

    <h1 class="mb-4 fw-bold">Tableau de bord</h1>

    <div class="stats">

        <div class="card-box">

            <p>Étudiants</p>

            <h2 th:text="${studentsCount}"></h2>

        </div>

        <div class="card-box">

            <p>Stages</p>

            <h2 th:text="${internshipsCount}"></h2>

        </div>

        <div class="card-box">

            <p>Entreprises</p>

            <h2 th:text="${companiesCount}"></h2>

        </div>

        <div class="card-box">

            <p>Demandes</p>

            <h2>18</h2>

        </div>

    </div>

    <div class="card-box">

        <h3 class="mb-4">Dernières demandes de stage</h3>

        <table class="table">

            <thead>

            <tr>

                <th>Étudiant</th>

                <th>Entreprise</th>

                <th>Sujet</th>

                <th>Statut</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="internship : ${internships}">

                <td th:text="${internship.etudiant}"></td>

                <td th:text="${internship.entreprise}"></td>

                <td th:text="${internship.titre}"></td>

                <td>

                    <span class="badge bg-warning"

                          th:if="${internship.statut == 'En attente'}">

                        En attente

                    </span>

                    <span class="badge bg-success"

                          th:if="${internship.statut == 'Accepté'}">

                        Accepté

                    </span>

                    <span class="badge bg-danger"

                          th:if="${internship.statut == 'Refusé'}">

                        Refusé

                    </span>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>

</html>
